# dvc.yaml
# --------------------------------------------------------
# DVC pipeline — full on-device ML pipeline.
# Run with:  dvc repro
# Visualize: dvc dag
# --------------------------------------------------------

stages:

  ingest:
    cmd: python -m src.data.ingest
    deps:
      - src/data/ingest.py
      - src/utils/config_loader.py
      - configs/config.yaml
      - data/raw/Amazon_review.csv
    outs:
      - data/raw/Amazon_review_validated.csv:
          cache: true
          persist: false

  preprocess:
    cmd: python -m src.data.preprocess
    deps:
      - src/data/preprocess.py
      - src/utils/config_loader.py
      - configs/config.yaml
      - data/raw/Amazon_review_validated.csv
    outs:
      - data/processed/train.csv:
          cache: true
      - data/processed/val.csv:
          cache: true
      - data/processed/test.csv:
          cache: true
    metrics:
      - data/processed/baseline_stats.json:
          cache: false
  featurize:
    cmd: python -m src.features.featurize
    deps:
      - src/features/featurize.py
      - configs/config.yaml
      - data/processed/train.csv
      - data/processed/val.csv
      - data/processed/test.csv
    outs:
      - data/processed/X_train.npy:
          cache: true
      - data/processed/X_val.npy:
          cache: true
      - data/processed/X_test.npy:
          cache: true
      - data/processed/y_train.npy:
          cache: true
      - data/processed/y_val.npy:
          cache: true
      - data/processed/y_test.npy:
          cache: true
      - data/processed/tokenizer.pkl:
          cache: true

  train:
    cmd: python -m src.models.train
    deps:
      - src/models/train.py
      - src/utils/config_loader.py
      - configs/config.yaml
      - data/processed/X_train.npy
      - data/processed/X_val.npy
      - data/processed/X_test.npy
      - data/processed/y_train.npy
      - data/processed/y_val.npy
      - data/processed/y_test.npy
      - data/processed/tokenizer.pkl
    outs:
      - data/processed/bilstm_model:
          cache: true
    metrics:
      - data/processed/train_metrics.json:
          cache: false

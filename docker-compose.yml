# docker-compose.yml (project root)
# --------------------------------------------------------
# All services: frontend, backend, mlflow, prometheus,
# grafana. Run with:  docker compose up --build
# --------------------------------------------------------



services:

  # ---- 1. FastAPI Inference Backend ----
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    container_name: sentiment-backend
    ports:
      - "8000:8000"
    volumes:
      - ./data/processed:/app/data/processed:ro
      - ./configs:/app/configs:ro
      - ./mlruns:/app/mlruns:ro
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000
    depends_on:
      - mlflow
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    container_name: sentiment-frontend
    ports:
      - "3002:80"
    depends_on:
      - backend
    restart: unless-stopped

  # ---- 3. MLflow Tracking Server ----
  mlflow:
    build:
      context: .
      dockerfile: docker/Dockerfile.mlflow
    container_name: sentiment-mlflow
    ports:
      - "5000:5000"
    volumes:
      - ./mlruns:/mlflow/mlruns
    restart: unless-stopped

  # ---- 4. Prometheus ----
  prometheus:
    image: prom/prometheus:v2.47.0
    container_name: sentiment-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./docker/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./docker/alert_rules.yml:/etc/prometheus/alert_rules.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    restart: unless-stopped

  # ---- 5. Grafana ----
  grafana:
    image: grafana/grafana:10.1.5
    container_name: sentiment-grafana
    ports:
      - "3003:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
    restart: unless-stopped
    
  airflow:
    image: apache/airflow:2.7.3-python3.10
    container_name: sentiment-airflow
    command: standalone
    ports:
      - "8080:8080"
    environment:
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
      _PIP_ADDITIONAL_REQUIREMENTS: "loguru==0.7.2 nltk==3.8.1 emoji==2.8.0 scikit-learn==1.3.2 pandas==2.0.3 numpy==1.24.3 pyyaml==6.0.1"

    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/plugins:/opt/airflow/plugins
      - .:/opt/airflow/project
      - airflow_data:/opt/airflow
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    restart: unless-stopped

volumes:
  prometheus_data:
  grafana_data:
  mlflow_artifacts:
  airflow_data:

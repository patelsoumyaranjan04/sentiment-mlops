name: CI Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:

  test:
    name: Run Test Suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.backend.txt') }}
      - name: Install dependencies (CI - no tensorflow)
        run: |
          python -m pip install --upgrade pip
          grep -v "tensorflow" requirements.backend.txt > /tmp/ci_requirements.txt
          pip install -r /tmp/ci_requirements.txt
          pip install pytest==7.4.3 pytest-cov==4.1.0 httpx==0.24.1

      - name: Install tensorflow for tests
        run: pip install tensorflow-cpu==2.15.0
      - name: Download NLTK data
        run: |
          python -c "
          import nltk
          nltk.download('stopwords', quiet=True)
          nltk.download('wordnet', quiet=True)
          nltk.download('punkt', quiet=True)
          nltk.download('omw-1.4', quiet=True)
          "
      - name: Run unit tests
        run: pytest tests/unit/ -v --tb=short --cov=src --cov-report=xml:coverage.xml
      - name: Run integration tests
        run: pytest tests/integration/ -v --tb=short
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage.xml

  lint:
    name: Code Quality Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install linting tools
        run: pip install flake8 black isort
      - name: Black
        run: black --check --diff src/ tests/
        continue-on-error: true
      - name: isort
        run: isort --check-only --diff src/ tests/
        continue-on-error: true
      - name: Flake8
        run: flake8 src/ tests/ --max-line-length=100 --ignore=E203,W503,E501 --exclude=__pycache__
        continue-on-error: true
      - run: echo "Lint complete (non-blocking)"

  docker-build:
    name: Verify Docker Build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build backend
        run: docker build -f docker/Dockerfile.backend -t sentiment-backend:ci .
      - name: Build frontend
        run: docker build -f docker/Dockerfile.frontend -t sentiment-frontend:ci .
name: sentiment-mlops
channels:
  - defaults
  - conda-forge
dependencies:
  - python=3.10
  - pip
  - pip:
      # Core ML
      - tensorflow==2.15.0
      - scikit-learn==1.3.2
      - numpy==1.24.3
      - pandas==2.0.3

      # NLP
      - nltk==3.8.1
      - emoji==2.8.0

      # MLOps - experiment tracking
      - mlflow==2.8.1
      - dvc==3.28.0

      # NOTE: Apache Airflow installed separately via install_airflow.sh

      # API serving
      - fastapi==0.104.1
      - uvicorn[standard]==0.24.0
      - pydantic==2.4.2

      # Monitoring
      - prometheus-client==0.19.0
      - prometheus-fastapi-instrumentator==6.1.0

      # Visualization / EDA
      - matplotlib==3.8.0
      - seaborn==0.13.0
      - wordcloud==1.9.2

      # Testing
      - pytest==7.4.3
      - httpx==0.25.2

      # Utilities
      - python-dotenv==1.0.0
      - requests==2.31.0
      - tqdm==4.66.1
      - loguru==0.7.2